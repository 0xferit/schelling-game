name: Deploy next to Cloudflare Workers

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-next:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: deploy-next
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Stamp build info
        run: |
          sed -i \
            -e "s/__BUILD_HASH__/$(git rev-parse --short HEAD)/" \
            -e "s/__BUILD_DATE__/$(date -u +%Y-%m-%dT%H:%MZ)/" \
            public/index.html public/app.html

      - name: Apply next D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply DB --env next --remote

      - name: Deploy next worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -o pipefail

          attempts=3
          for attempt in $(seq 1 "$attempts"); do
            log_file="$(mktemp)"
            if npx wrangler deploy --env next --var "BUILD_HASH:$(git rev-parse --short HEAD)" 2>&1 | tee "$log_file"; then
              rm -f "$log_file"
              exit 0
            fi

            if ! grep -q 'Service unavailable \[code: 7010\]' "$log_file"; then
              rm -f "$log_file"
              exit 1
            fi

            rm -f "$log_file"

            if [ "$attempt" -eq "$attempts" ]; then
              echo "wrangler deploy hit transient Cloudflare API 7010 after ${attempts} attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "Retrying wrangler deploy after transient Cloudflare API 7010 (${attempt}/${attempts}) in ${sleep_seconds}s..." >&2
            sleep "$sleep_seconds"
          done

      - name: Smoke test next
        env:
          SMOKE_BASE_URL: https://next.schelling.games
        run: npm run smoke:remote
