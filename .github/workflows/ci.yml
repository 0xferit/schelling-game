name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

  typecheck-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Type check (Node)
        run: npm run typecheck

  typecheck-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Type check (Worker)
        run: npm run typecheck:worker

  domain-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Tests
        run: npm test -- --coverage

  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Worker tests
        run: npm run test:worker

  staging-smoke:
    name: Staging deploy + smoke
    if: github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    needs:
      - lint
      - typecheck-node
      - typecheck-worker
      - domain-tests
      - worker-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: cloudflare-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Stamp build info
        run: |
          sed -i \
            -e "s/__BUILD_HASH__/$(git rev-parse --short HEAD)/" \
            -e "s/__BUILD_DATE__/$(date -u +%Y-%m-%dT%H:%MZ)/" \
            public/index.html public/app.html

      - name: Apply staging D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply DB --env staging --remote

      - name: Deploy staging worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          deploy_output="$(npx wrangler deploy --env staging 2>&1 | tee /dev/stderr)"
          staging_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]]+' | grep 'workers.dev' | tail -n 1 || true)"

          if [ -z "$staging_url" ]; then
            staging_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]]+' | tail -n 1 || true)"
          fi

          if [ -z "$staging_url" ]; then
            echo "Failed to determine staging URL from wrangler deploy output" >&2
            exit 1
          fi

          echo "url=$staging_url" >> "$GITHUB_OUTPUT"
          echo "Staging URL: $staging_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test staging
        env:
          STAGING_BASE_URL: ${{ steps.deploy.outputs.url }}
        run: npm run smoke:staging

  preview-guide:
    name: Preview guide comment
    if: always()
    needs:
      - lint
      - typecheck-node
      - typecheck-worker
      - domain-tests
      - worker-tests
      - staging-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Update preview guide comment
        uses: actions/github-script@v8
        env:
          SAME_REPO_PR: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          STAGING_RESULT: ${{ needs.staging-smoke.result }}
          STAGING_URL: ${{ needs.staging-smoke.outputs.url }}
        with:
          script: |
            const marker = '<!-- preview-guide -->';
            const sameRepo = process.env.SAME_REPO_PR === 'true';
            const stagingResult = process.env.STAGING_RESULT || 'skipped';
            const stagingUrl = process.env.STAGING_URL || '';

            if (!sameRepo) {
              core.info('Fork PR detected; relying on PR template for preview instructions.');
              return;
            }

            let statusLine = '- Staging preview: pending';
            let nextStepLine =
              '- Next step: wait for lint, typechecks, and tests to pass so the `Staging deploy + smoke` job can run.';

            if (stagingResult === 'success' && stagingUrl) {
              statusLine = `- Staging preview: [${stagingUrl}](${stagingUrl})`;
              nextStepLine =
                '- Next step: open the staging URL above. It is a shared preview environment, so later PR runs can replace it.';
            } else if (stagingResult === 'failure' || stagingResult === 'cancelled') {
              statusLine = '- Staging preview: unavailable';
              nextStepLine =
                '- Next step: inspect the `Staging deploy + smoke` job in Actions, or run the local preview flow below.';
            }

            const body = [
              marker,
              '## Preview Guide',
              '',
              'This repo uses a shared Cloudflare staging deployment instead of isolated per-PR preview environments.',
              '',
              statusLine,
              nextStepLine,
              '- Local preview:',
              '  ```sh',
              '  npm ci',
              '  npx wrangler d1 migrations apply DB --local',
              '  npm run dev',
              '  ```',
              '- Smoke validation: if staging deploys successfully, the same CI run also executes `npm run smoke:staging`.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
                per_page: 100,
              },
            );

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
