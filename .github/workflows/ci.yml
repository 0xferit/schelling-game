name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

  typecheck-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Type check (Node)
        run: npm run typecheck

  typecheck-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Type check (Worker)
        run: npm run typecheck:worker

  domain-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Tests
        run: npm test -- --coverage

  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Worker tests
        run: npm run test:worker

  staging-smoke:
    name: Staging deploy + smoke
    if: github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - lint
      - typecheck-node
      - typecheck-worker
      - domain-tests
      - worker-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: cloudflare-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Stamp build info
        run: |
          sed -i \
            -e "s/__BUILD_HASH__/$(git rev-parse --short HEAD)/" \
            -e "s/__BUILD_DATE__/$(date -u +%Y-%m-%dT%H:%MZ)/" \
            public/index.html public/app.html

      - name: Apply staging D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply DB --env staging --remote

      - name: Deploy staging worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          deploy_output="$(npx wrangler deploy --env staging 2>&1 | tee /dev/stderr)"
          staging_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]]+' | grep 'workers.dev' | tail -n 1 || true)"

          if [ -z "$staging_url" ]; then
            staging_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]]+' | tail -n 1 || true)"
          fi

          if [ -z "$staging_url" ]; then
            echo "Failed to determine staging URL from wrangler deploy output" >&2
            exit 1
          fi

          echo "url=$staging_url" >> "$GITHUB_OUTPUT"
          echo "Staging URL: $staging_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test staging
        env:
          STAGING_BASE_URL: ${{ steps.deploy.outputs.url }}
        run: npm run smoke:staging
