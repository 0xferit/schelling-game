name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Type check (Node)
        run: npx tsc --noEmit

      - name: Type check (Worker)
        run: npx tsc --noEmit -p tsconfig.worker.json

      - name: Tests
        run: npm test
