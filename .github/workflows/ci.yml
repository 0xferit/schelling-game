name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check (Node)
        run: npm run typecheck

      - name: Type check (Worker)
        run: npm run typecheck:worker

      - name: Tests
        run: npm test
