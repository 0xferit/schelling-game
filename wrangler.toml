name = "schelling-game"
account_id = "abfb18f38d5263b5da582e40ba6ae552"
main = "src/worker.ts"
compatibility_date = "2026-03-29"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[d1_databases]]
binding = "DB"
database_name = "schelling-game-db"
database_id = "ccf25d5a-0c4e-4520-9e08-e3f2a02b78d1"
migrations_dir = "d1-migrations"

[ai]
binding = "AI"
remote = true

[vars]
AI_BOT_ENABLED = "false"
AI_BOT_MODELS = "@cf/nvidia/nemotron-3-120b-a12b,@cf/meta/llama-3.3-70b-instruct-fp8-fast"
AI_BOT_TIMEOUT_MS = "5000"
OPEN_TEXT_PROMPTS_ENABLED = "true"

[env.staging]
name = "schelling-game-staging"

[[env.staging.durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "schelling-game-staging"
database_id = "bfb6e799-80bc-4e0b-bf92-99250555806b"
migrations_dir = "d1-migrations"

[env.staging.ai]
binding = "AI"
remote = true

[env.staging.vars]
AI_BOT_ENABLED = "false"
AI_BOT_MODELS = "@cf/nvidia/nemotron-3-120b-a12b,@cf/meta/llama-3.3-70b-instruct-fp8-fast"
AI_BOT_TIMEOUT_MS = "5000"
OPEN_TEXT_PROMPTS_ENABLED = "true"

[assets]
directory = "./public"
run_worker_first = ["/ws*", "/api/*"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]
