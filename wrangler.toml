name = "schelling-games"
account_id = "abfb18f38d5263b5da582e40ba6ae552"
main = "src/worker.ts"
compatibility_date = "2026-03-29"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[d1_databases]]
binding = "DB"
database_name = "schelling-games-db"
database_id = "26b17fcf-1579-40e2-8f7d-bdc187410c1a"
migrations_dir = "d1-migrations"

[ai]
binding = "AI"
remote = true

[vars]
AI_BOT_ENABLED = "true"
AI_BOT_MODELS = "@cf/meta/llama-3-8b-instruct,@cf/meta/llama-3.1-8b-instruct-fast,@cf/meta/llama-3.1-70b-instruct,@cf/meta/llama-3.3-70b-instruct-fp8-fast"
AI_BOT_TIMEOUT_MS = "10000"
OPEN_TEXT_PROMPTS_ENABLED = "true"
OPEN_TEXT_NORMALIZER_TIMEOUT_MS = "10000"
TURNSTILE_SITE_KEY = "0x4AAAAAACyDgW8MDPcYEH2x"

[env.next]
name = "schelling-games-next"
workers_dev = false

[[env.next.durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[env.next.d1_databases]]
binding = "DB"
database_name = "schelling-games-next"
database_id = "b221fd85-6c49-4bb3-a0c5-30a02b7726c4"
migrations_dir = "d1-migrations"

[env.next.ai]
binding = "AI"
remote = true

[env.next.vars]
AI_BOT_ENABLED = "true"
AI_BOT_MODELS = "@cf/meta/llama-3-8b-instruct,@cf/meta/llama-3.1-8b-instruct-fast,@cf/meta/llama-3.1-70b-instruct,@cf/meta/llama-3.3-70b-instruct-fp8-fast"
AI_BOT_TIMEOUT_MS = "10000"
OPEN_TEXT_PROMPTS_ENABLED = "true"
OPEN_TEXT_NORMALIZER_TIMEOUT_MS = "10000"
TURNSTILE_SITE_KEY = "0x4AAAAAACyDgW8MDPcYEH2x"

[assets]
directory = "./public"
run_worker_first = ["/ws*", "/api/*"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]
